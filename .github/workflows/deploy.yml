name: Deploy Frontend to K3s

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
permissions:
  contents: read
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ secrets.OWNER }}/k3s-frontend:latest

      - name: Connect to VM via Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTH_KEY }}
          
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Deploy to K3s
        run: |
          ssh -o StrictHostKeyChecking=no \
            user-k3s@100.107.34.111 << 'EOF'
            cd ~/k8s-app
            kubectl set image deployment/frontend-deployment frontend=ghcr.io/${{ github.repository_owner }}/k3s-frontend:latest
            kubectl rollout restart deployment/frontend-deployment
            echo "✅ Frontend deployed successfully!"
          EOF
